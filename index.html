<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="倉位管理">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>倉位管理計算機</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0f1117;--card:#1a1d27;--card2:#111318;--border:rgba(255,255,255,0.08);
  --text:#e2e8f0;--muted:#94a3b8;--hint:#64748b;
  --blue:#60a5fa;--blue-bg:rgba(59,130,246,.15);--blue-bd:rgba(59,130,246,.3);
  --green:#4ade80;--green-bg:rgba(34,197,94,.12);--green-bd:rgba(74,222,128,.3);
  --red:#f87171;--red-bg:rgba(239,68,68,.12);--red-bd:rgba(248,113,113,.3);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,.12);--amber-bd:rgba(251,191,36,.3);
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overscroll-behavior:none}
.app{max-width:900px;margin:0 auto;padding:env(safe-area-inset-top,12px) 12px 80px}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px}
.app-title{font-size:17px;font-weight:600;color:#f1f5f9}
.app-sub{font-size:11px;color:var(--hint)}
.card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--rl);padding:14px 14px;margin-bottom:10px}
.st{font-size:10px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.g5{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}
@media(max-width:600px){.g4{grid-template-columns:repeat(2,minmax(0,1fr))}.g5{grid-template-columns:repeat(2,minmax(0,1fr))}}
.metric{background:var(--card2);border-radius:var(--r);padding:10px 12px;border:0.5px solid rgba(255,255,255,0.04)}
.ml{font-size:10px;color:var(--hint);margin-bottom:3px}
.mv{font-size:16px;font-weight:600;color:#f1f5f9}
.mv.s{color:var(--green)}.mv.d{color:var(--red)}.mv.w{color:var(--amber)}.mv.b{color:var(--blue)}
label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px}
input,select{width:100%;font-size:13px;padding:8px 10px;border:0.5px solid rgba(255,255,255,0.12);border-radius:var(--r);background:var(--card2);color:var(--text);outline:none;-webkit-appearance:none}
input:focus,select:focus{border-color:rgba(255,255,255,0.35)}
select option{background:var(--card)}
.btn{font-size:12px;padding:7px 13px;border:0.5px solid rgba(255,255,255,0.15);border-radius:var(--r);background:transparent;color:var(--text);cursor:pointer;white-space:nowrap;transition:opacity .15s}
.btn:active{opacity:.7}
.btn.pi{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}
.btn.ps{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.btn.pd{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.btn.pw{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bd)}
.btn-xs{font-size:10px;padding:4px 9px}
.frow{display:grid;gap:8px;margin-bottom:8px}
.fact{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(15,17,23,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:0.5px solid var(--border);display:flex;padding:0 0 env(safe-area-inset-bottom,0);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;border:none;background:transparent;color:var(--hint);cursor:pointer;gap:3px;font-size:10px;transition:color .15s}
.nav-btn.active{color:var(--blue)}
.nav-btn svg{width:20px;height:20px}
.panel{display:none}.panel.active{display:block}
.badge{font-size:9px;padding:2px 7px;border-radius:5px;font-weight:600;display:inline-block}
.bi{background:var(--blue-bg);color:var(--blue)}
.bs{background:var(--green-bg);color:var(--green)}
.bd{background:var(--red-bg);color:var(--red)}
.bw{background:var(--amber-bg);color:var(--amber)}
.alert-s{background:var(--green-bg);border:0.5px solid var(--green-bd);color:var(--green);border-radius:var(--r);padding:8px 12px;font-size:12px;font-weight:500;margin-bottom:8px}
table{width:100%;font-size:11px;border-collapse:collapse;table-layout:fixed}
th{font-size:9px;font-weight:600;color:var(--hint);text-align:left;padding:6px 5px;border-bottom:0.5px solid var(--border);white-space:nowrap}
td{padding:7px 5px;border-bottom:0.5px solid rgba(255,255,255,0.04);color:var(--text);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.modal-bg{background:rgba(0,0,0,0.65);border-radius:var(--rl);padding:1.5rem 12px;margin-bottom:10px}
.modal{background:var(--card);border:0.5px solid rgba(255,255,255,.14);border-radius:var(--rl);padding:16px;max-width:520px;margin:0 auto}
.modal-title{font-size:14px;font-weight:600;margin-bottom:10px;color:#f1f5f9}
.modal-sub{font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5}
.toggle-row{display:flex;gap:5px;margin-bottom:9px}
.tbtn{font-size:10px;padding:4px 11px;border:0.5px solid rgba(255,255,255,.12);border-radius:6px;cursor:pointer;background:transparent;color:var(--muted)}
.tbtn.active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}
.hint-tag{font-size:10px;color:var(--hint);margin-top:3px}
.month-block{margin-bottom:8px;padding:10px 12px;background:var(--card2);border-radius:var(--r);border:0.5px solid rgba(255,255,255,0.04)}
.month-lbl{font-size:11px;font-weight:600;margin-bottom:8px;color:var(--text)}
.chart-wrap{position:relative;height:220px;margin-top:4px}
.chart-wrap-tall{position:relative;height:280px;margin-top:4px}
.section-tabs{display:flex;gap:4px;margin-bottom:12px}
.stab{font-size:11px;padding:5px 12px;border:0.5px solid var(--border);border-radius:6px;cursor:pointer;background:transparent;color:var(--hint)}
.stab.active{background:var(--card2);color:var(--text);border-color:rgba(255,255,255,.2)}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--hint);font-size:13px}
.divider{height:0.5px;background:var(--border);margin:12px 0}
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div>
      <div class="app-title">倉位管理</div>
      <div class="app-sub" id="fx-status">載入匯率中...</div>
    </div>
    <div style="text-align:right">
      <div class="mv w" style="font-size:13px" id="hdr-1r">1R: —</div>
      <div class="app-sub" id="hdr-acct">帳戶: —</div>
    </div>
  </div>

  <!-- 總覽 -->
  <div id="tab-home" class="panel active">
    <div class="card">
      <div class="st">風險總覽</div>
      <div class="g4">
        <div class="metric"><div class="ml">持倉總 R</div><div class="mv w" id="ov-r">—</div></div>
        <div class="metric"><div class="ml">總風險 USD</div><div class="mv d" id="ov-risk">—</div></div>
        <div class="metric"><div class="ml">開倉數量</div><div class="mv b" id="ov-cnt">—</div></div>
        <div class="metric"><div class="ml">達 3R 倉位</div><div class="mv s" id="ov-3r">—</div></div>
      </div>
    </div>
    <div id="home-alerts"></div>
    <div class="card">
      <div class="section-tabs">
        <button class="stab active" onclick="switchChart('cumr')">累計 R 走勢</button>
        <button class="stab" onclick="switchChart('monthly')">月度盈虧</button>
        <button class="stab" onclick="switchChart('winrate')">勝率趨勢</button>
      </div>
      <div class="chart-wrap"><canvas id="main-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="st">帳戶設定</div>
      <div class="g4" style="align-items:end;margin-bottom:8px">
        <div><label>貨幣</label><select id="acct-ccy" onchange="updateAcct()"><option value="HKD">HKD</option><option value="USD">USD</option></select></div>
        <div><label>帳戶金額</label><input type="number" id="acct-bal" value="500000" oninput="updateAcct()"></div>
        <div><label>1R = %</label><input type="number" id="r-pct" value="1" step="0.1" oninput="updateAcct()"></div>
        <div><label>HKD/USD</label><input type="number" id="fx" value="7.845" step="0.001" oninput="updateAcct()"></div>
      </div>
      <div class="g4">
        <div class="metric"><div class="ml">帳戶 HKD</div><div class="mv" id="m-hkd">—</div></div>
        <div class="metric"><div class="ml">帳戶 USD</div><div class="mv" id="m-usd">—</div></div>
        <div class="metric"><div class="ml">1R HKD</div><div class="mv w" id="m-1rhkd">—</div></div>
        <div class="metric"><div class="ml">1R USD</div><div class="mv w" id="m-1rusd">—</div></div>
      </div>
    </div>
  </div>

  <!-- 新增倉位 -->
  <div id="tab-new" class="panel">
    <div class="card">
      <div class="st">新增倉位</div>
      <div class="frow" style="grid-template-columns:1fr 1fr 1fr">
        <div><label>股票代號</label><input type="text" id="n-tick" placeholder="AAPL / 0700" onblur="onTickBlur()"></div>
        <div><label>市場</label><select id="n-mkt" onchange="onMktChange()"><option value="US">美股 US</option><option value="HK">港股 HK</option></select></div>
        <div><label>貨幣</label><select id="n-ccy"><option value="USD">USD</option><option value="HKD">HKD</option></select></div>
      </div>
      <div class="frow" style="grid-template-columns:1fr 1fr 1fr">
        <div><label>買入價</label><input type="number" id="n-price" step="0.01" oninput="calcNew()"></div>
        <div><label>止損價位</label><input type="number" id="n-sl" step="0.01" oninput="calcNew()"></div>
        <div><label>目標 R</label><select id="n-rr" onchange="calcNew()"><option value="2">2R</option><option value="3" selected>3R</option><option value="4">4R</option><option value="5">5R</option></select></div>
      </div>
      <div class="frow" style="grid-template-columns:1fr 1fr 1fr" id="n-row3">
        <div id="n-lot-wrap"><label>每手股數 <span id="n-lot-tag" style="font-size:9px;color:var(--blue)"></span></label><input type="number" id="n-lot" value="100" oninput="calcNew()"></div>
        <div id="n-us-wrap" style="display:none"><label>買入股數 (留空=自動)</label><input type="number" id="n-us-shares" oninput="calcNew()"></div>
        <div><label>建倉日期</label><input type="date" id="n-date"></div>
        <div><label>備注</label><input type="text" id="n-note"></div>
      </div>
      <div id="new-result" style="display:none;margin-top:10px">
        <div class="g5" id="new-metrics"></div>
      </div>
      <div class="fact">
        <button class="btn pi" onclick="addPos()">建倉</button>
        <button class="btn" onclick="clearNew()">清除</button>
      </div>
    </div>
  </div>

  <!-- 持倉記錄 -->
  <div id="tab-positions" class="panel">
    <div class="card" style="margin-bottom:8px">
      <div class="g3" style="align-items:end">
        <div><label>建倉日期 從</label><input type="date" id="f-from"></div>
        <div><label>至</label><input type="date" id="f-to"></div>
        <div style="display:flex;gap:6px;align-items:flex-end">
          <button class="btn pi" style="flex:1" onclick="renderPos()">篩選</button>
          <button class="btn" onclick="clearFilter()">清除</button>
        </div>
      </div>
    </div>
    <div id="pos-alerts"></div>
    <div class="card" style="overflow-x:auto">
      <table>
        <thead><tr>
          <th style="width:8%">代號</th>
          <th style="width:6%">市場</th>
          <th style="width:10%">均價</th>
          <th style="width:7%">股數</th>
          <th style="width:9%">止損價</th>
          <th style="width:9%">初始風險</th>
          <th style="width:8%">現 R</th>
          <th style="width:9%">目標價</th>
          <th style="width:8%">建倉日</th>
          <th style="width:26%">操作</th>
        </tr></thead>
        <tbody id="pos-body"></tbody>
      </table>
      <div id="pos-empty" class="empty-state">尚無開倉持倉</div>
    </div>
    <div id="modal-area"></div>
  </div>

  <!-- 收益表 -->
  <div id="tab-pnl" class="panel">
    <div class="card">
      <div class="st">整體統計</div>
      <div class="g4" id="pnl-summary" style="margin-bottom:14px"></div>
      <div class="st">盈虧走勢</div>
      <div class="chart-wrap-tall"><canvas id="pnl-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="st">按平倉月份</div>
      <div id="pnl-months"></div>
    </div>
    <div class="card" style="overflow-x:auto">
      <div class="st">已平倉記錄</div>
      <table>
        <thead><tr>
          <th>代號</th><th>市場</th><th>建倉日</th><th>平倉日</th>
          <th>成本</th><th>賣出</th><th>股數</th>
          <th>盈虧</th><th>R 值</th><th>結果</th>
        </tr></thead>
        <tbody id="closed-body"></tbody>
      </table>
      <div id="closed-empty" class="empty-state">尚無平倉記錄</div>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('home')" id="nav-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
    總覽
  </button>
  <button class="nav-btn" onclick="switchTab('new')" id="nav-new">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    新增
  </button>
  <button class="nav-btn" onclick="switchTab('positions')" id="nav-positions">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/></svg>
    持倉
  </button>
  <button class="nav-btn" onclick="switchTab('pnl')" id="nav-pnl">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
    收益
  </button>
</nav>

<script>
let S={acct:{bal:500000,ccy:'HKD',rPct:1,fx:7.845},pos:[],closed:[]};
let mainChart=null, pnlChart=null, currentChartType='cumr';

function load(){try{const d=localStorage.getItem('pmv3');if(d){const p=JSON.parse(d);if(p.acct)S.acct=p.acct;if(p.pos)S.pos=p.pos;if(p.closed)S.closed=p.closed;}}catch(e){}}
function save(){try{localStorage.setItem('pmv3',JSON.stringify(S));}catch(e){}}
function fmt(n,d=2){return Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtC(n,ccy){return ccy+' '+fmt(n,2);}
function toUSD(a,ccy){return ccy==='HKD'?a/S.acct.fx:a;}
function get1R(){const b=S.acct.ccy==='HKD'?S.acct.bal/S.acct.fx:S.acct.bal;return b*S.acct.rPct/100;}
function today(){return new Date().toISOString().slice(0,10);}

function updateAcct(){
  S.acct.bal=parseFloat(document.getElementById('acct-bal').value)||0;
  S.acct.ccy=document.getElementById('acct-ccy').value;
  S.acct.rPct=parseFloat(document.getElementById('r-pct').value)||1;
  S.acct.fx=parseFloat(document.getElementById('fx').value)||7.845;
  const hkd=S.acct.ccy==='HKD'?S.acct.bal:S.acct.bal*S.acct.fx;
  const usd=S.acct.ccy==='USD'?S.acct.bal:S.acct.bal/S.acct.fx;
  document.getElementById('m-hkd').textContent=fmt(hkd,0);
  document.getElementById('m-usd').textContent=fmt(usd,0);
  document.getElementById('m-1rhkd').textContent=fmt(get1R()*S.acct.fx,0);
  document.getElementById('m-1rusd').textContent=fmt(get1R(),2);
  document.getElementById('hdr-1r').textContent='1R: USD '+fmt(get1R(),0);
  document.getElementById('hdr-acct').textContent='帳戶: '+fmt(hkd,0)+' HKD';
  save();updateOverview();calcNew();
}

function onMktChange(){
  const hk=document.getElementById('n-mkt').value==='HK';
  document.getElementById('n-lot-wrap').style.display=hk?'block':'none';
  document.getElementById('n-us-wrap').style.display=hk?'none':'block';
  document.getElementById('n-ccy').value=hk?'HKD':'USD';
  calcNew();
}

function onTickBlur(){
  if(document.getElementById('n-mkt').value==='HK') fetchLotSize();
}

async function fetchLotSize(){
  const tick=document.getElementById('n-tick').value.trim();
  if(!tick) return;
  const tag=document.getElementById('n-lot-tag');
  tag.textContent='搜尋中...';
  try{
    const code=tick.replace(/\D/g,'').padStart(4,'0');
    const r=await fetch('https://query1.finance.yahoo.com/v8/finance/chart/'+code+'.HK?interval=1d&range=1d');
    const d=await r.json();
    const lot=d?.chart?.result?.[0]?.meta?.regularMarketLotSize;
    if(lot&&lot>0){document.getElementById('n-lot').value=lot;tag.textContent='已自動填入';calcNew();}
    else tag.textContent='手動輸入';
  }catch(e){tag.textContent='手動輸入';}
}

function calcNew(){
  const price=parseFloat(document.getElementById('n-price').value);
  const sl=parseFloat(document.getElementById('n-sl').value);
  const rr=parseFloat(document.getElementById('n-rr').value)||3;
  const mkt=document.getElementById('n-mkt').value;
  const ccy=document.getElementById('n-ccy').value;
  if(!price||!sl||sl>=price){document.getElementById('new-result').style.display='none';return;}
  const oneR=get1R();
  const riskPS=toUSD(price-sl,ccy);
  let sugShares,lotNote='';
  if(mkt==='HK'){
    const lot=parseInt(document.getElementById('n-lot').value)||100;
    const raw=oneR/riskPS;
    sugShares=Math.max(lot,Math.floor(raw/lot)*lot);
    lotNote='('+Math.round(sugShares/lot)+' 手 × '+lot+' 股)';
  } else {
    const usS=parseFloat(document.getElementById('n-us-shares').value);
    sugShares=usS>0?usS:Math.max(1,Math.round(oneR/riskPS));
  }
  const sugCost=sugShares*price;
  const totalRisk=toUSD(riskPS*sugShares,ccy);
  const rVal=totalRisk/oneR;
  const tpN=price+(price-sl)*rr;
  const balUSD=S.acct.ccy==='HKD'?S.acct.bal/S.acct.fx:S.acct.bal;
  const pct=toUSD(sugCost,ccy)/balUSD*100;
  document.getElementById('new-result').style.display='block';
  document.getElementById('new-metrics').innerHTML=
    '<div class="metric"><div class="ml">建議股數'+(lotNote?'<br><span style="font-size:9px;color:var(--hint)">'+lotNote+'</span>':'')+'</div><div class="mv">'+fmt(sugShares,0)+'</div></div>'+
    '<div class="metric"><div class="ml">建議金額</div><div class="mv">'+fmtC(sugCost,ccy)+'</div></div>'+
    '<div class="metric"><div class="ml">此倉 R 值</div><div class="mv d">'+fmt(rVal,2)+'R</div></div>'+
    '<div class="metric"><div class="ml">'+rr+'R 目標</div><div class="mv s">'+fmt(tpN,2)+'</div></div>'+
    '<div class="metric"><div class="ml">佔帳戶 %</div><div class="mv">'+fmt(pct,1)+'%</div></div>';
  window._nc={price,sl,sugShares,sugCost,rVal,ccy,rr,tpN,riskPS,mkt,totalRisk};
}

function addPos(){
  const tick=document.getElementById('n-tick').value.toUpperCase().trim();
  const mkt=document.getElementById('n-mkt').value;
  const ccy=document.getElementById('n-ccy').value;
  const date=document.getElementById('n-date').value||today();
  const note=document.getElementById('n-note').value;
  if(!tick||!window._nc){alert('請填寫股票代號並確認計算結果');return;}
  const c=window._nc;
  S.pos.push({id:Date.now(),tick,mkt,ccy,date,note,avgCost:c.price,shares:c.sugShares,sl:c.sl,initRisk:c.totalRisk,rr:c.rr,tp:c.tpN,lots:[{date,price:c.price,shares:c.sugShares,type:'建倉'}]});
  save();updateOverview();clearNew();switchTab('positions');
}

function clearNew(){
  ['n-tick','n-price','n-sl','n-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('new-result').style.display='none';
  window._nc=null;
}

function calcPosR(p){return toUSD((p.avgCost-p.sl)*p.shares,p.ccy)/get1R();}

function updateOverview(){
  const totalR=S.pos.reduce((s,p)=>s+calcPosR(p),0);
  const totalRisk=S.pos.reduce((s,p)=>s+p.initRisk,0);
  const hit3r=S.pos.filter(p=>calcPosR(p)>=3).length;
  document.getElementById('ov-r').textContent=fmt(totalR,2)+'R';
  document.getElementById('ov-risk').textContent='USD '+fmt(totalRisk,0);
  document.getElementById('ov-cnt').textContent=S.pos.length;
  document.getElementById('ov-3r').textContent=hit3r;
  const alerts=document.getElementById('home-alerts');
  alerts.innerHTML='';
  S.pos.filter(p=>calcPosR(p)>=3).forEach(p=>{
    alerts.innerHTML+='<div class="alert-s">'+p.tick+' 已達 '+fmt(calcPosR(p),2)+'R — 考慮部分平倉鎖定利潤</div>';
  });
  updateMainChart();
}

function renderPos(){
  const from=document.getElementById('f-from').value;
  const to=document.getElementById('f-to').value;
  let list=S.pos;
  if(from) list=list.filter(p=>p.date>=from);
  if(to) list=list.filter(p=>p.date<=to);
  const alerts=document.getElementById('pos-alerts');
  alerts.innerHTML='';
  list.filter(p=>calcPosR(p)>=3).forEach(p=>{
    alerts.innerHTML+='<div class="alert-s">'+p.tick+' 已達 '+fmt(calcPosR(p),2)+'R — 考慮部分平倉</div>';
  });
  const body=document.getElementById('pos-body');
  const empty=document.getElementById('pos-empty');
  if(!list.length){body.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  body.innerHTML=list.map(p=>{
    const r=calcPosR(p);
    const rc=r>=3?'s':r<0?'d':'w';
    return '<tr>'+
      '<td><strong>'+p.tick+'</strong></td>'+
      '<td><span class="badge '+(p.mkt==='HK'?'bw':'bi')+'">'+p.mkt+'</span></td>'+
      '<td>'+fmt(p.avgCost,2)+' '+p.ccy+'</td>'+
      '<td>'+fmt(p.shares,0)+'</td>'+
      '<td style="color:var(--red)">'+fmt(p.sl,2)+'</td>'+
      '<td style="color:var(--red)">'+fmt(p.initRisk,0)+'</td>'+
      '<td class="mv '+rc+'" style="font-size:11px">'+fmt(r,2)+'R</td>'+
      '<td style="color:var(--green)">'+fmt(p.tp,2)+'</td>'+
      '<td style="color:var(--hint);font-size:10px">'+p.date+'</td>'+
      '<td><div style="display:flex;gap:3px;flex-wrap:wrap">'+
        '<button class="btn btn-xs pi" onclick="showModal(\'add\','+p.id+')">加倉</button>'+
        '<button class="btn btn-xs ps" onclick="showModal(\'reduce\','+p.id+')">減倉</button>'+
        '<button class="btn btn-xs pw" onclick="showModal(\'sl\','+p.id+')">止損</button>'+
      '</div></td></tr>';
  }).join('');
}

function clearFilter(){
  document.getElementById('f-from').value='';
  document.getElementById('f-to').value='';
  renderPos();
}

function showModal(type,id){
  const p=S.pos.find(x=>x.id===id);if(!p) return;
  closeModal();
  const area=document.getElementById('modal-area');
  if(type==='add'){
    area.innerHTML='<div class="modal-bg"><div class="modal">'+
      '<div class="modal-title">加倉 — '+p.tick+'</div>'+
      '<div class="modal-sub">現持 '+fmt(p.shares,0)+' 股 @ '+fmt(p.avgCost,2)+' '+p.ccy+' | 止損 '+fmt(p.sl,2)+' | 現 R: '+fmt(calcPosR(p),2)+'R</div>'+
      '<div class="toggle-row"><button class="tbtn active" id="am-r" onclick="setAddMode(\'r\')">按 R 數</button><button class="tbtn" id="am-s" onclick="setAddMode(\'s\')">按股數</button></div>'+
      '<div class="g3">'+
        '<div><label>加倉價格</label><input type="number" id="add-price" step="0.01" oninput="calcAdd('+id+')"></div>'+
        '<div id="amr-wrap"><label>加倉 R 數</label><input type="number" id="add-r" value="0.3" step="0.1" oninput="calcAdd('+id+')"></div>'+
        '<div id="ams-wrap" style="display:none"><label>加倉股數</label><input type="number" id="add-sh" oninput="calcAdd('+id+')"></div>'+
        '<div><label>新止損價</label><input type="number" id="add-sl" value="'+p.sl+'" step="0.01" oninput="calcAdd('+id+')"></div>'+
      '</div>'+
      '<div id="add-result" style="margin-top:9px"></div>'+
      '<div class="fact"><button class="btn pi" onclick="execAdd('+id+')">確認加倉</button><button class="btn" onclick="closeModal()">取消</button></div>'+
    '</div></div>';
    window._addMode='r';
  } else if(type==='reduce'){
    area.innerHTML='<div class="modal-bg"><div class="modal">'+
      '<div class="modal-title">減倉 — '+p.tick+'</div>'+
      '<div class="modal-sub">現持 '+fmt(p.shares,0)+' 股 @ '+fmt(p.avgCost,2)+' '+p.ccy+'</div>'+
      '<div class="g3">'+
        '<div><label>賣出價格</label><input type="number" id="red-price" step="0.01" oninput="calcReduce('+id+')"></div>'+
        '<div><label>賣出股數 (最多 '+p.shares+')</label><input type="number" id="red-sh" max="'+p.shares+'" oninput="calcReduce('+id+')"></div>'+
        '<div><label>平倉日期</label><input type="date" id="red-date" value="'+today()+'"></div>'+
      '</div>'+
      '<div id="red-result" style="margin-top:9px"></div>'+
      '<div class="fact"><button class="btn ps" onclick="execReduce('+id+')">確認減倉</button><button class="btn" onclick="closeModal()">取消</button></div>'+
    '</div></div>';
  } else if(type==='sl'){
    area.innerHTML='<div class="modal-bg"><div class="modal">'+
      '<div class="modal-title">修改止損 — '+p.tick+'</div>'+
      '<div class="modal-sub">現止損: '+fmt(p.sl,2)+' | 現 R: '+fmt(calcPosR(p),2)+'R (只可上移)</div>'+
      '<div class="g2">'+
        '<div><label>新止損價</label><input type="number" id="sl-new" step="0.01" value="'+p.sl+'" oninput="calcSL('+id+')"></div>'+
        '<div id="sl-res" style="padding-top:1.2rem"></div>'+
      '</div>'+
      '<div class="fact"><button class="btn pw" onclick="execSL('+id+')">確認修改</button><button class="btn" onclick="closeModal()">取消</button></div>'+
    '</div></div>';
  }
}

function setAddMode(m){
  window._addMode=m;
  document.getElementById('am-r').classList.toggle('active',m==='r');
  document.getElementById('am-s').classList.toggle('active',m==='s');
  document.getElementById('amr-wrap').style.display=m==='r'?'block':'none';
  document.getElementById('ams-wrap').style.display=m==='s'?'block':'none';
}

function calcAdd(id){
  const p=S.pos.find(x=>x.id===id);if(!p) return;
  const addPrice=parseFloat(document.getElementById('add-price').value);
  const newSL=parseFloat(document.getElementById('add-sl').value);
  if(!addPrice||!newSL||newSL>=addPrice) return;
  const oneR=get1R();
  const rPS=toUSD(addPrice-newSL,p.ccy);
  let addSh;
  if(window._addMode==='r'){
    const addR=parseFloat(document.getElementById('add-r').value)||0.3;
    addSh=Math.max(1,Math.round(oneR*addR/rPS));
    if(p.mkt==='HK'){const lot=100;addSh=Math.max(lot,Math.floor(addSh/lot)*lot);}
  } else {
    addSh=parseInt(document.getElementById('add-sh').value)||0;
  }
  const usedR=toUSD(rPS*addSh,p.ccy)/oneR;
  const newAvg=(p.avgCost*p.shares+addPrice*addSh)/(p.shares+addSh);
  const newTR=toUSD((newAvg-newSL)*(p.shares+addSh),p.ccy);
  const newR=newTR/oneR;
  document.getElementById('add-result').innerHTML=
    '<div class="g4">'+
    '<div class="metric"><div class="ml">加倉股數</div><div class="mv">'+fmt(addSh,0)+'</div></div>'+
    '<div class="metric"><div class="ml">新平均成本</div><div class="mv">'+fmt(newAvg,2)+'</div></div>'+
    '<div class="metric"><div class="ml">消耗 R</div><div class="mv w">'+fmt(usedR,2)+'R</div></div>'+
    '<div class="metric"><div class="ml">合併 R</div><div class="mv d">'+fmt(newR,2)+'R</div></div>'+
    '</div>';
  window._ac={addSh,newAvg,newSL,newR,addPrice,usedR,newTR};
}

function execAdd(id){
  if(!window._ac){alert('請先填寫加倉資料');return;}
  const p=S.pos.find(x=>x.id===id);if(!p) return;
  const c=window._ac;
  p.shares+=c.addSh;p.avgCost=c.newAvg;p.sl=c.newSL;p.initRisk=c.newTR;
  p.tp=c.newAvg+(c.newAvg-c.newSL)*p.rr;
  p.lots.push({date:today(),price:c.addPrice,shares:c.addSh,type:'加倉 +'+fmt(c.usedR,2)+'R'});
  save();closeModal();updateOverview();renderPos();
}

function calcReduce(id){
  const p=S.pos.find(x=>x.id===id);if(!p) return;
  const sellP=parseFloat(document.getElementById('red-price').value);
  const sellSh=parseInt(document.getElementById('red-sh').value);
  if(!sellP||!sellSh) return;
  const pnl=(sellP-p.avgCost)*sellSh;
  const pnlUSD=toUSD(pnl,p.ccy);
  const rR=pnlUSD/get1R();
  const rem=p.shares-sellSh;
  document.getElementById('red-result').innerHTML=
    '<div class="g3">'+
    '<div class="metric"><div class="ml">實現盈虧</div><div class="mv '+(pnl>=0?'s':'d')+'">'+fmtC(pnl,p.ccy)+'</div></div>'+
    '<div class="metric"><div class="ml">實現 R</div><div class="mv '+(rR>=0?'s':'d')+'">'+fmt(rR,2)+'R</div></div>'+
    '<div class="metric"><div class="ml">減倉後剩餘</div><div class="mv">'+fmt(Math.max(0,rem),0)+' 股</div></div>'+
    '</div>';
  window._rc={sellP,sellSh,pnl,pnlUSD,rR,rem};
}

function execReduce(id){
  if(!window._rc){alert('請先填寫減倉資料');return;}
  const p=S.pos.find(x=>x.id===id);if(!p) return;
  const c=window._rc;
  const closeDate=document.getElementById('red-date').value||today();
  S.closed.push({id:Date.now(),tick:p.tick,mkt:p.mkt,ccy:p.ccy,openDate:p.date,closeDate,avgCost:p.avgCost,sellPrice:c.sellP,shares:c.sellSh,pnl:c.pnl,pnlUSD:c.pnlUSD,rRealized:c.rR});
  if(c.rem<=0){S.pos=S.pos.filter(x=>x.id!==id);}
  else{p.shares=c.rem;p.initRisk=toUSD((p.avgCost-p.sl)*c.rem,p.ccy);}
  save();closeModal();updateOverview();renderPos();
}

function calcSL(id){
  const p=S.pos.find(x=>x.id===id);if(!p) return;
  const newSL=parseFloat(document.getElementById('sl-new').value);
  const el=document.getElementById('sl-res');
  if(!newSL){window._slc=null;return;}
  if(newSL<=p.sl){el.innerHTML='<div style="font-size:10px;color:var(--red)">止損只可上移</div>';window._slc=null;return;}
  const newRisk=toUSD((p.avgCost-newSL)*p.shares,p.ccy);
  const newR=newRisk/get1R();
  el.innerHTML='<div style="font-size:11px">新 R: <strong style="color:var(--amber)">'+fmt(newR,2)+'R</strong><br><span style="font-size:10px;color:var(--hint)">風險 USD '+fmt(newRisk,0)+'</span></div>';
  window._slc={newSL,newRisk,newR};
}

function execSL(id){
  if(!window._slc){alert('請輸入有效的新止損價');return;}
  const p=S.pos.find(x=>x.id===id);if(!p) return;
  p.sl=window._slc.newSL;p.initRisk=window._slc.newRisk;
  save();closeModal();updateOverview();renderPos();
}

function closeModal(){document.getElementById('modal-area').innerHTML='';}

// ── Charts ────────────────────────────────────────────────────────────────────
const chartDefaults={
  responsive:true,maintainAspectRatio:false,
  plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(26,29,39,0.95)',titleColor:'#e2e8f0',bodyColor:'#94a3b8',borderColor:'rgba(255,255,255,0.1)',borderWidth:1}},
  scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#64748b',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#64748b',font:{size:10}}}}
};

function buildCumRData(){
  const sorted=[...S.closed].sort((a,b)=>a.closeDate.localeCompare(b.closeDate));
  let cum=0;
  const labels=[], data=[];
  sorted.forEach(c=>{cum+=c.rRealized;labels.push(c.closeDate.slice(5));data.push(parseFloat(cum.toFixed(2)));});
  return{labels,datasets:[{data,borderColor:'#60a5fa',backgroundColor:'rgba(59,130,246,0.08)',tension:.35,fill:true,pointRadius:3,pointBackgroundColor:'#60a5fa'}]};
}

function buildMonthlyData(){
  const months={};
  S.closed.forEach(c=>{const m=c.closeDate.slice(0,7);if(!months[m])months[m]=0;months[m]+=c.pnlUSD;});
  const keys=Object.keys(months).sort();
  return{labels:keys,datasets:[{data:keys.map(k=>parseFloat(months[k].toFixed(0))),backgroundColor:keys.map(k=>months[k]>=0?'rgba(74,222,128,0.6)':'rgba(248,113,113,0.6)'),borderColor:keys.map(k=>months[k]>=0?'#4ade80':'#f87171'),borderWidth:1}]};
}

function buildWinrateData(){
  const months={};
  S.closed.forEach(c=>{const m=c.closeDate.slice(0,7);if(!months[m])months[m]={w:0,t:0};months[m].t++;if(c.rRealized>0)months[m].w++;});
  const keys=Object.keys(months).sort();
  return{labels:keys,datasets:[{data:keys.map(k=>parseFloat((months[k].w/months[k].t*100).toFixed(1))),borderColor:'#fbbf24',backgroundColor:'rgba(251,191,36,0.08)',tension:.35,fill:true,pointRadius:3,pointBackgroundColor:'#fbbf24'}]};
}

function switchChart(type){
  currentChartType=type;
  document.querySelectorAll('.stab').forEach((b,i)=>b.classList.toggle('active',['cumr','monthly','winrate'][i]===type));
  updateMainChart();
}

function updateMainChart(){
  const ctx=document.getElementById('main-chart').getContext('2d');
  if(mainChart) mainChart.destroy();
  if(!S.closed.length){mainChart=null;return;}
  let cfg;
  if(currentChartType==='cumr'){
    cfg={type:'line',data:buildCumRData(),options:{...chartDefaults,plugins:{...chartDefaults.plugins,tooltip:{...chartDefaults.plugins.tooltip,callbacks:{label:c=>c.parsed.y.toFixed(2)+'R'}}}}};
  } else if(currentChartType==='monthly'){
    cfg={type:'bar',data:buildMonthlyData(),options:{...chartDefaults,plugins:{...chartDefaults.plugins,tooltip:{...chartDefaults.plugins.tooltip,callbacks:{label:c=>'USD '+fmt(c.parsed.y,0)}}}}};
  } else {
    cfg={type:'line',data:buildWinrateData(),options:{...chartDefaults,scales:{...chartDefaults.scales,y:{...chartDefaults.scales.y,min:0,max:100,ticks:{...chartDefaults.scales.y.ticks,callback:v=>v+'%'}}},plugins:{...chartDefaults.plugins,tooltip:{...chartDefaults.plugins.tooltip,callbacks:{label:c=>c.parsed.y.toFixed(1)+'%'}}}}};
  }
  mainChart=new Chart(ctx,cfg);
}

function renderPnL(){
  const body=document.getElementById('closed-body');
  const empty=document.getElementById('closed-empty');
  if(!S.closed.length){body.innerHTML='';empty.style.display='block';}
  else{
    empty.style.display='none';
    body.innerHTML=S.closed.map(c=>{
      const win=c.rRealized>0;
      return '<tr>'+
        '<td><strong>'+c.tick+'</strong></td>'+
        '<td><span class="badge '+(c.mkt==='HK'?'bw':'bi')+'">'+c.mkt+'</span></td>'+
        '<td style="font-size:10px;color:var(--hint)">'+c.openDate+'</td>'+
        '<td style="font-size:10px;color:var(--hint)">'+c.closeDate+'</td>'+
        '<td>'+fmt(c.avgCost,2)+'</td>'+
        '<td>'+fmt(c.sellPrice,2)+'</td>'+
        '<td>'+fmt(c.shares,0)+'</td>'+
        '<td style="color:'+(win?'var(--green)':'var(--red)')+'">'+fmtC(c.pnl,c.ccy)+'</td>'+
        '<td style="color:'+(win?'var(--green)':'var(--red)')+'">'+fmt(c.rRealized,2)+'R</td>'+
        '<td><span class="badge '+(win?'bs':'bd')+'">'+(win?'盈利':'虧損')+'</span></td>'+
      '</tr>';
    }).join('');
  }
  const totalPnl=S.closed.reduce((s,c)=>s+c.pnlUSD,0);
  const totalR=S.closed.reduce((s,c)=>s+c.rRealized,0);
  const totalWin=S.closed.filter(c=>c.rRealized>0).length;
  const avgR=S.closed.length?totalR/S.closed.length:0;
  document.getElementById('pnl-summary').innerHTML=
    '<div class="metric"><div class="ml">總實現盈虧</div><div class="mv '+(totalPnl>=0?'s':'d')+'">USD '+fmt(totalPnl,0)+'</div></div>'+
    '<div class="metric"><div class="ml">總 R</div><div class="mv '+(totalR>=0?'s':'d')+'">'+fmt(totalR,2)+'R</div></div>'+
    '<div class="metric"><div class="ml">勝率</div><div class="mv">'+(S.closed.length?fmt(totalWin/S.closed.length*100,1):0)+'%</div></div>'+
    '<div class="metric"><div class="ml">平均 R / 倉</div><div class="mv '+(avgR>=0?'s':'d')+'">'+fmt(avgR,2)+'R</div></div>';
  const months={};
  S.closed.forEach(c=>{const m=c.closeDate.slice(0,7);if(!months[m])months[m]={pnl:0,r:0,win:0,total:0};months[m].pnl+=c.pnlUSD;months[m].r+=c.rRealized;months[m].total++;if(c.rRealized>0)months[m].win++;});
  document.getElementById('pnl-months').innerHTML=Object.keys(months).sort().reverse().map(m=>{
    const d=months[m];
    return '<div class="month-block">'+
      '<div class="month-lbl">'+m+'</div>'+
      '<div class="g4">'+
      '<div><div class="ml">盈虧 USD</div><div style="font-size:13px;font-weight:600;color:'+(d.pnl>=0?'var(--green)':'var(--red)')+'">'+fmt(d.pnl,0)+'</div></div>'+
      '<div><div class="ml">R 總計</div><div style="font-size:13px;font-weight:600;color:'+(d.r>=0?'var(--green)':'var(--red)')+'">'+fmt(d.r,2)+'R</div></div>'+
      '<div><div class="ml">勝率</div><div style="font-size:13px;font-weight:600">'+fmt(d.win/d.total*100,1)+'% ('+d.win+'/'+d.total+')</div></div>'+
      '<div><div class="ml">平均 R</div><div style="font-size:13px;font-weight:600;color:'+(d.r/d.total>=0?'var(--green)':'var(--red)')+'">'+fmt(d.r/d.total,2)+'R</div></div>'+
      '</div></div>';
  }).join('');
  // PnL chart
  const ctx2=document.getElementById('pnl-chart').getContext('2d');
  if(pnlChart) pnlChart.destroy();
  if(S.closed.length){
    pnlChart=new Chart(ctx2,{type:'line',data:buildCumRData(),options:{...chartDefaults,plugins:{...chartDefaults.plugins,tooltip:{...chartDefaults.plugins.tooltip,callbacks:{label:c=>c.parsed.y.toFixed(2)+'R'}}}}});
  }
}

function switchTab(t){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',['home','new','positions','pnl'][i]===t));
  if(t==='positions') renderPos();
  if(t==='pnl') renderPnL();
  if(t==='home') updateMainChart();
  closeModal();
}

async function fetchFX(){
  try{
    const r=await fetch('https://api.frankfurter.app/latest?from=USD&to=HKD');
    const d=await r.json();
    if(d.rates?.HKD){
      S.acct.fx=d.rates.HKD;
      document.getElementById('fx').value=d.rates.HKD.toFixed(4);
      document.getElementById('fx-status').textContent='匯率已更新 '+new Date().toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'});
      updateAcct();
    }
  }catch(e){document.getElementById('fx-status').textContent='使用預設匯率';}
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

document.getElementById('acct-bal').value=S.acct.bal;
document.getElementById('acct-ccy').value=S.acct.ccy;
document.getElementById('r-pct').value=S.acct.rPct;
document.getElementById('fx').value=S.acct.fx;
document.getElementById('n-date').value=today();
onMktChange();
updateAcct();
fetchFX();
</script>
